<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Videoflix</title>
    </head>
    <body style="box-sizing: border-box; width: 100%; max-width: 1024px; display: flex; flex-direction: column; align-items: start; margin: 0; padding: 0; font-family: Arial, sans-serif;">
        <div style="width: 100%; text-align: center;">
            <img src="" alt="VIDEOFLIX">
        </div>
        <p>Dear {{ user.username }},</p>
        <p>Thank you for registering with Videoflix. To complete your registration and verify your email address, please click the link below:</p>
        <a href="{{ activation_url }}" style="background-color: #1222D9; color: white; text-decoration: none; padding: 12px 24px; border-radius: 24px; font-weight: bold;">
            <span>Activate account</span>
        </a>
        <p>If you did not create an account with us, please disregeard this email.</p>
        <p>Best regards,</p>
        <p>Your Videoflix Team!</p>
    </body>
</html>
